# Render 部署配置文件
services:
  - type: web
    name: zhibeixiaoyu
    runtime: python
    buildCommand: pip install -r zhibei_backend/requirements.txt
    startCommand: cd zhibei_backend && python run_prod.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEFAULT_AI_PROVIDER
        value: deepseek
      - key: DEFAULT_AI_MODEL
        value: deepseek-chat
